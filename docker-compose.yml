# Postgres local para desarrollo (alternativa a Supabase mientras desarrollas).
# Úsalo con:  docker compose up -d
# Y en .env:  DATABASE_URL=postgres://store:store@127.0.0.1:5433/store
#
# Para producción usa Supabase (ver PLAN.md §6 y §9). Este compose es solo para local.
services:
  postgres:
    image: postgres:16-alpine
    container_name: tienda_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: store
      POSTGRES_PASSWORD: store
      POSTGRES_DB: store
    ports:
      - '5433:5432' # host 5433 para no chocar con un Postgres en 5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U store -d store']
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  pgdata:
